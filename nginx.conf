worker_processes auto;

events {
  worker_connections 4096;
  use epoll;
}

http {
  access_log off;
  error_log /dev/null crit;

  upstream backend_api {
    server api1:3000;
    server api2:3000;
    keepalive 128;
  }

  server {
    listen 9999;
    server_name _;

    location / {
      proxy_pass http://backend_api;

      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}