services:
  api1:
    build: .
    container_name: rinha_api_1
    environment:
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    build: .
    container_name: rinha_api_2
    environment:
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  nginx:
    image: nginx:1.27-alpine
    container_name: rinha_nginx
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30MB"
